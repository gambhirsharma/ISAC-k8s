<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 620" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" role="img" aria-label="ISAC-k8s architecture: an edge fleet running the sensing hot-path, fanning DetectionResults into a central kind cloud running cloudcore, output, Prometheus and Grafana">
  <defs>
    <marker id="data" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#58a6ff"/>
    </marker>
    <marker id="ctrl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8b949e"/>
    </marker>
    <marker id="mono" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#7ee787"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1060" height="620" rx="14" fill="#0d1117"/>
  <text x="30" y="40" fill="#f0f6fc" font-size="21" font-weight="700">ISAC-k8s — distributed 6G ISAC sensing fleet on KubeEdge</text>
  <text x="30" y="62" fill="#8b949e" font-size="13">Each edge node runs the whole detection hot-path locally; only DetectionResults fan in to one central cloud collector.</text>

  <!-- ============ EDGE FLEET ============ -->
  <text x="30" y="98" fill="#7ee787" font-size="13" font-weight="700" letter-spacing="1">EDGE FLEET  (edgecore · label isac-edge=true)</text>

  <!-- edge node A -->
  <g>
    <rect x="30" y="110" width="470" height="150" rx="10" fill="#0f1a17" stroke="#2ea043" stroke-width="1.4"/>
    <text x="46" y="132" fill="#7ee787" font-size="12.5" font-weight="700">edge node · hostNetwork, localhost hops (no kube-proxy / no DNS)</text>
    <!-- chips -->
    <g font-size="11.5" text-anchor="middle">
      <rect x="46" y="150" width="96" height="82" rx="7" fill="#132a2e" stroke="#2ea043"/>
      <text x="94" y="182" fill="#7ee787" font-weight="700">simulator</text>
      <text x="94" y="200" fill="#8b949e" font-size="10">synthetic CSI</text>
      <text x="94" y="214" fill="#8b949e" font-size="10">100 Hz</text>

      <rect x="166" y="150" width="96" height="82" rx="7" fill="#132a2e" stroke="#2ea043"/>
      <text x="214" y="186" fill="#7ee787" font-weight="700">ingestion</text>
      <text x="214" y="204" fill="#8b949e" font-size="10">:50051</text>

      <rect x="286" y="150" width="96" height="82" rx="7" fill="#132a2e" stroke="#2ea043"/>
      <text x="334" y="180" fill="#7ee787" font-weight="700">preproc</text>
      <text x="334" y="198" fill="#8b949e" font-size="10">features</text>
      <text x="334" y="212" fill="#8b949e" font-size="10">:50052</text>

      <rect x="406" y="150" width="80" height="82" rx="7" fill="#132a2e" stroke="#2ea043"/>
      <text x="446" y="184" fill="#7ee787" font-weight="700">infer</text>
      <text x="446" y="202" fill="#8b949e" font-size="10">detect :50053</text>
    </g>
    <g stroke="#7ee787" stroke-width="1.6" marker-end="url(#mono)">
      <line x1="142" y1="191" x2="164" y2="191"/>
      <line x1="262" y1="191" x2="284" y2="191"/>
      <line x1="382" y1="191" x2="404" y2="191"/>
    </g>
  </g>

  <!-- edge node B (ghosted, "add a node") -->
  <g opacity="0.85">
    <rect x="30" y="278" width="470" height="86" rx="10" fill="#0f1a17" stroke="#2ea043" stroke-width="1.2" stroke-dasharray="5 4"/>
    <text x="46" y="300" fill="#8b949e" font-size="12">edge node ×N — label a node → DaemonSets schedule the whole pipeline</text>
    <g font-size="11" text-anchor="middle" fill="#7ee787">
      <rect x="46" y="312" width="96" height="38" rx="6" fill="#132a2e" stroke="#2ea043" opacity="0.7"/><text x="94" y="336">simulator</text>
      <rect x="166" y="312" width="96" height="38" rx="6" fill="#132a2e" stroke="#2ea043" opacity="0.7"/><text x="214" y="336">ingestion</text>
      <rect x="286" y="312" width="96" height="38" rx="6" fill="#132a2e" stroke="#2ea043" opacity="0.7"/><text x="334" y="336">preproc</text>
      <rect x="406" y="312" width="80" height="38" rx="6" fill="#132a2e" stroke="#2ea043" opacity="0.7"/><text x="446" y="336">infer</text>
    </g>
  </g>

  <!-- ============ CLOUD ============ -->
  <text x="600" y="98" fill="#58a6ff" font-size="13" font-weight="700" letter-spacing="1">CLOUD  (kind cluster · single untainted node)</text>
  <rect x="600" y="110" width="430" height="470" rx="10" fill="#0e1626" stroke="#388bfd" stroke-width="1.4"/>

  <!-- cloudcore -->
  <rect x="618" y="128" width="394" height="96" rx="8" fill="#1c2333" stroke="#d29922" stroke-width="1.3"/>
  <text x="634" y="150" fill="#e3b341" font-size="12.5" font-weight="700">cloudcore — KubeEdge control plane</text>
  <text x="634" y="170" fill="#c9d1d9" font-size="11">CloudHub  :10000  (websocket to edges)</text>
  <text x="634" y="187" fill="#c9d1d9" font-size="11">CloudStream  :10003/:10004  (kubectl logs / exec)</text>
  <text x="634" y="204" fill="#c9d1d9" font-size="11">dynamicController  (EdgeMesh service resolution)</text>

  <!-- output -->
  <rect x="618" y="240" width="394" height="112" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.3"/>
  <text x="634" y="262" fill="#79c0ff" font-size="12.5" font-weight="700">output — central collector + dashboard</text>
  <text x="634" y="282" fill="#c9d1d9" font-size="11">gRPC fan-in  :50054   ·   NodePort  :30054</text>
  <text x="634" y="299" fill="#c9d1d9" font-size="11">ClockSyncService (skew correction)</text>
  <text x="634" y="316" fill="#c9d1d9" font-size="11">web dashboard  :8080  (nodes · latency · log)</text>
  <text x="634" y="335" fill="#8b949e" font-size="10.5">re-exports per-edge-node latency as Prometheus metrics</text>

  <!-- prometheus + grafana -->
  <rect x="618" y="368" width="190" height="92" rx="8" fill="#161b22" stroke="#db6d28" stroke-width="1.3"/>
  <text x="634" y="390" fill="#f0883e" font-size="12" font-weight="700">prometheus</text>
  <text x="634" y="410" fill="#c9d1d9" font-size="10.5">:9090</text>
  <text x="634" y="427" fill="#8b949e" font-size="10.5">scrapes app=output</text>
  <text x="634" y="443" fill="#8b949e" font-size="10.5">only (edge unreachable)</text>

  <rect x="822" y="368" width="190" height="92" rx="8" fill="#161b22" stroke="#f2a93b" stroke-width="1.3"/>
  <text x="838" y="390" fill="#f2cc60" font-size="12" font-weight="700">grafana</text>
  <text x="838" y="410" fill="#c9d1d9" font-size="10.5">:3000</text>
  <text x="838" y="427" fill="#8b949e" font-size="10.5">fleet latency</text>
  <text x="838" y="443" fill="#8b949e" font-size="10.5">dashboards</text>

  <!-- intra-cloud arrows -->
  <line x1="713" y1="368" x2="713" y2="354" stroke="#db6d28" stroke-width="1.5" marker-end="url(#ctrl)"/>
  <line x1="822" y1="414" x2="808" y2="414" stroke="#f2a93b" stroke-width="1.5" marker-end="url(#ctrl)"/>

  <!-- ============ CROSS-NODE LINKS ============ -->
  <!-- control websocket edge A <-> cloudcore -->
  <path d="M500 176 C 555 176, 560 176, 618 176" fill="none" stroke="#8b949e" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#ctrl)" marker-start="url(#ctrl)"/>
  <text x="512" y="168" fill="#8b949e" font-size="10">edgehub ⇄ CloudHub (websocket)</text>

  <!-- data fan-in edge A infer -> output -->
  <path d="M486 210 C 545 236, 560 288, 618 290" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#data)"/>
  <text x="500" y="250" fill="#58a6ff" font-size="10.5" font-weight="700">DetectionResult</text>
  <text x="500" y="264" fill="#58a6ff" font-size="10">fan-in (EdgeMesh / :30054)</text>

  <!-- data fan-in edge B -> output -->
  <path d="M486 330 C 545 320, 560 306, 618 306" fill="none" stroke="#58a6ff" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#data)"/>

  <!-- footer legend -->
  <g font-size="10.5">
    <line x1="30" y1="600" x2="60" y2="600" stroke="#7ee787" stroke-width="2" marker-end="url(#mono)"/>
    <text x="66" y="604" fill="#8b949e">node-local hop (localhost, sub-ms)</text>
    <line x1="320" y1="600" x2="350" y2="600" stroke="#58a6ff" stroke-width="2" marker-end="url(#data)"/>
    <text x="356" y="604" fill="#8b949e">cross-node data fan-in</text>
    <line x1="560" y1="600" x2="590" y2="600" stroke="#8b949e" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ctrl)"/>
    <text x="596" y="604" fill="#8b949e">KubeEdge control websocket</text>
  </g>
</svg>
