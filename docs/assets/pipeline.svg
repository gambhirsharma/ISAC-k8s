<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 500" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" role="img" aria-label="ISAC pipeline dataflow: simulator to ingestion to preprocessing, an async dispatch queue to inference, then an async sender pool over the WAN to the cloud output collector, with the latency metric measured at each stage">
  <defs>
    <marker id="p-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1060" height="500" rx="14" fill="#0d1117"/>
  <text x="30" y="38" fill="#f0f6fc" font-size="19" font-weight="700">Frame journey &amp; where latency is measured</text>
  <text x="30" y="59" fill="#8b949e" font-size="12.5">Two bounded async queues decouple the producer from the network so throughput is not capped at 1/RTT.</text>

  <!-- edge / cloud boundary -->
  <line x1="795" y1="80" x2="795" y2="430" stroke="#30363d" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="620" y="98" fill="#7ee787" font-size="12" font-weight="700" text-anchor="end">◀ EDGE NODE (hostNetwork, localhost)</text>
  <text x="812" y="98" fill="#58a6ff" font-size="12" font-weight="700">CLOUD ▶</text>

  <!-- stage boxes -->
  <g font-size="12">
    <rect x="30" y="150" width="130" height="78" rx="8" fill="#132a2e" stroke="#2ea043"/>
    <text x="95" y="184" fill="#7ee787" font-size="12.5" font-weight="700" text-anchor="middle">simulator</text>
    <text x="95" y="203" fill="#8b949e" font-size="10" text-anchor="middle">CSIFrame @100Hz</text>

    <rect x="205" y="150" width="130" height="78" rx="8" fill="#132a2e" stroke="#2ea043"/>
    <text x="270" y="184" fill="#7ee787" font-size="12.5" font-weight="700" text-anchor="middle">ingestion</text>
    <text x="270" y="203" fill="#8b949e" font-size="10" text-anchor="middle">stamp ingest ns</text>

    <rect x="380" y="150" width="130" height="78" rx="8" fill="#132a2e" stroke="#2ea043"/>
    <text x="445" y="184" fill="#7ee787" font-size="12.5" font-weight="700" text-anchor="middle">preprocessing</text>
    <text x="445" y="203" fill="#8b949e" font-size="10" text-anchor="middle">mean/var/Δamp</text>

    <rect x="620" y="150" width="130" height="78" rx="8" fill="#132a2e" stroke="#2ea043"/>
    <text x="685" y="184" fill="#7ee787" font-size="12.5" font-weight="700" text-anchor="middle">inference</text>
    <text x="685" y="203" fill="#8b949e" font-size="10" text-anchor="middle">threshold detect</text>

    <rect x="880" y="150" width="150" height="78" rx="8" fill="#161b22" stroke="#388bfd"/>
    <text x="955" y="184" fill="#79c0ff" font-size="12.5" font-weight="700" text-anchor="middle">output</text>
    <text x="955" y="203" fill="#8b949e" font-size="10" text-anchor="middle">store + dashboard</text>
  </g>

  <!-- sync arrows -->
  <g stroke="#58a6ff" stroke-width="2" marker-end="url(#p-arr)">
    <line x1="160" y1="189" x2="203" y2="189"/>
    <line x1="335" y1="189" x2="378" y2="189"/>
  </g>

  <!-- async dispatch queue preproc -> inference -->
  <rect x="527" y="169" width="76" height="40" rx="6" fill="#20161f" stroke="#bc8cff"/>
  <text x="565" y="185" fill="#d2a8ff" font-size="9.5" text-anchor="middle">dispatch</text>
  <text x="565" y="198" fill="#8b949e" font-size="9" text-anchor="middle">queue 50</text>
  <line x1="510" y1="189" x2="525" y2="189" stroke="#58a6ff" stroke-width="2" marker-end="url(#p-arr)"/>
  <line x1="603" y1="189" x2="618" y2="189" stroke="#58a6ff" stroke-width="2" marker-end="url(#p-arr)"/>

  <!-- async sender pool inference -> output (WAN) -->
  <rect x="768" y="169" width="90" height="40" rx="6" fill="#20161f" stroke="#bc8cff"/>
  <text x="813" y="185" fill="#d2a8ff" font-size="9.5" text-anchor="middle">sender pool</text>
  <text x="813" y="198" fill="#8b949e" font-size="9" text-anchor="middle">16 · queue 500</text>
  <line x1="750" y1="189" x2="766" y2="189" stroke="#58a6ff" stroke-width="2" marker-end="url(#p-arr)"/>
  <line x1="858" y1="189" x2="878" y2="189" stroke="#58a6ff" stroke-width="2" marker-end="url(#p-arr)"/>

  <!-- clock sync side probe -->
  <path d="M95 150 C 95 120, 955 120, 955 150" fill="none" stroke="#f2a93b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#p-arr)"/>
  <text x="525" y="116" fill="#f2cc60" font-size="10.5" text-anchor="middle">clock-sync probe → ClockSyncService (NTP min-RTT offset, out of band)</text>

  <!-- metric callouts -->
  <g font-size="10">
    <text x="95"  y="270" fill="#8b949e" text-anchor="middle">simulator_</text>
    <text x="95"  y="283" fill="#8b949e" text-anchor="middle">ingestion_latency_ms</text>

    <text x="445" y="270" fill="#8b949e" text-anchor="middle">preprocessing_</text>
    <text x="445" y="283" fill="#8b949e" text-anchor="middle">inference_rpc_latency_ms</text>
    <text x="445" y="296" fill="#6e7681" text-anchor="middle">(the isolated WiFi hop)</text>

    <text x="685" y="270" fill="#8b949e" text-anchor="middle">inference_latency_ms</text>
    <text x="685" y="283" fill="#6e7681" text-anchor="middle">(local compute)</text>

    <text x="955" y="270" fill="#79c0ff" text-anchor="middle">output_end_to_end_</text>
    <text x="955" y="283" fill="#79c0ff" text-anchor="middle">latency_raw / _corrected_ms</text>
    <text x="955" y="296" fill="#6e7681" text-anchor="middle">per edge_node</text>
  </g>

  <!-- per-stage ns carried on the wire -->
  <rect x="30" y="340" width="1000" height="120" rx="10" fill="#0e1626" stroke="#30363d"/>
  <text x="46" y="364" fill="#c9d1d9" font-size="12" font-weight="700">Per-stage timings ride the message itself</text>
  <text x="46" y="386" fill="#8b949e" font-size="11">ingestion stamps <tspan fill="#7ee787">ingestion_latency_ns</tspan> onto the frame → preprocessing copies it + adds <tspan fill="#7ee787">preprocessing_latency_ns</tspan> →</text>
  <text x="46" y="404" fill="#8b949e" font-size="11">inference adds <tspan fill="#7ee787">inference_latency_ns</tspan> + <tspan fill="#7ee787">edge_node</tspan>. The DetectionResult arriving at output therefore carries the</text>
  <text x="46" y="422" fill="#8b949e" font-size="11">complete per-stage breakdown, which output re-exports as <tspan fill="#79c0ff">output_stage_latency_ms{edge_node,stage}</tspan>.</text>
  <text x="46" y="444" fill="#6e7681" font-size="10.5">This is how edge latency reaches Prometheus without the cloud ever scraping an edge pod.</text>
</svg>
