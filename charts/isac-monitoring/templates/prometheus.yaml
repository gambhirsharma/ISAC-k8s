apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Release.Namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.evaluationInterval }}

    scrape_configs:
      # KubeEdge: the cloud CANNOT reach edge pod IPs, so we do NOT scrape the edge hot-path
      # pods (simulator/ingestion/preprocessing/inference) directly — their scrape would just
      # time out. Instead ALL edge latency observability arrives via the gRPC fan-in and is
      # re-exported by the cloud-side `output` pod as output_stage_latency_ms /
      # output_end_to_end_latency_raw_ms (labeled per edge_node). So we scrape app=output only.
      - job_name: isac-pipeline
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Values.sensingNamespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Only the cloud-side output pod is scrapable; drop the (unreachable) edge pods.
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: "output"
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      # Keep off edge nodes — see values.yaml `edge` comment.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ .Values.edge.nodeSelectorKey }}
                    operator: NotIn
                    values: [{{ .Values.edge.nodeSelectorValue | quote }}]
                  # Belt-and-suspenders: exclude any KubeEdge edge node, even one not
                  # (yet) labeled isac-edge=true (e.g. a joined-but-unlabeled edge host).
                  - key: node-role.kubernetes.io/edge
                    operator: DoesNotExist
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.prometheus.retention }}
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http
