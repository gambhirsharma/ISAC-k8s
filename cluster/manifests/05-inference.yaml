apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: inference
  namespace: isac-sensing
spec:
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
    spec:
      # Inference now runs ON each edge node (was central) — the whole detection
      # hot-path is node-local, so only the DetectionResult crosses the network to
      # the central `output` collector. Scales linearly per edge node, no central
      # inference bottleneck.
      nodeSelector:
        isac-edge: "true"
      containers:
        - name: inference
          image: isac-inference:latest
          imagePullPolicy: Always
          env:
            - name: OUTPUT_SERVICE
              value: "output:50054"
            - name: LISTEN_PORT
              value: "50053"
            - name: METRICS_PORT
              value: "8003"
            # Origin edge node, stamped onto every DetectionResult for the fleet dashboard.
            - name: EDGE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 50053
              name: grpc
            - containerPort: 8003
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: isac-sensing
spec:
  selector:
    app: inference
  # Node-local: preprocessing on edge-A only reaches inference on edge-A.
  internalTrafficPolicy: Local
  ports:
    - port: 50053
      targetPort: 50053
      name: grpc
