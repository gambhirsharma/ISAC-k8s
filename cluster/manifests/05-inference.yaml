apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: inference
  namespace: isac-sensing
spec:
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
    spec:
      # Inference runs ON each edge node — the whole detection hot-path is node-local, so
      # only the DetectionResult crosses the network to the central `output` collector.
      nodeSelector:
        isac-edge: "true"
      tolerations:
        - key: node-role.kubernetes.io/edge
          operator: Exists
          effect: NoSchedule
      # hostNetwork so preprocessing reaches it on localhost:50053. ClusterFirstWithHostNet
      # keeps cluster DNS so EdgeMesh can resolve the cross-node `output` service.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: inference
          image: isac-inference:latest
          imagePullPolicy: Always
          env:
            # Cross-node hop (edge->cloud), the ONLY hop that leaves the node. Resolved by
            # EdgeMesh; override to <cloud-lan-ip>:<nodeport> for the NodePort fallback.
            - name: OUTPUT_SERVICE
              value: "output:50054"
            - name: LISTEN_PORT
              value: "50053"
            - name: METRICS_PORT
              value: "8003"
            # Origin edge node, stamped onto every DetectionResult for the fleet dashboard.
            - name: EDGE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 50053
              name: grpc
            - containerPort: 8003
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
# No Service: only client is this node's preprocessing, over localhost:50053 (hostNetwork).
