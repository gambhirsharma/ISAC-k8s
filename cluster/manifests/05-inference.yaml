apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: inference
  namespace: isac-sensing
spec:
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
    spec:
      # Inference runs ON each edge node — the whole detection hot-path is node-local, so
      # only the DetectionResult crosses the network to the central `output` collector.
      nodeSelector:
        isac-edge: "true"
      tolerations:
        - key: node-role.kubernetes.io/edge
          operator: Exists
          effect: NoSchedule
      # hostNetwork so preprocessing reaches it on localhost:50053. ClusterFirstWithHostNet
      # keeps cluster DNS so EdgeMesh can resolve the cross-node `output` service.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: inference
          image: isac-inference:latest
          imagePullPolicy: Always
          env:
            # Cross-node hop (edge->cloud), the ONLY hop that leaves the node. EdgeMesh DNS
            # ("output:50054") doesn't route from real remote edge hosts (e.g. eagle-edge-1)
            # to the docker-internal control-plane IP, so pin the NodePort fallback at the
            # cloud host's Tailscale IP instead (reachable from both docker-bridge edges and
            # real remote edges over the tailnet).
            - name: OUTPUT_SERVICE
              value: "100.64.5.120:30054"
            # Default (16) assumes a low-latency link (fine for docker-bridge edges like
            # edge-hetzner). Real remote edges over WAN/relayed Tailscale see ~600ms per
            # StoreResult RPC; 16 threads only drains ~26 req/s against a 100Hz simulator,
            # so the queue (500) fills and frames sit ~19s before being dropped or sent.
            # 80 threads covers ~100Hz at up to ~800ms RPC latency with margin.
            - name: OUTPUT_SENDER_THREADS
              value: "80"
            - name: LISTEN_PORT
              value: "50053"
            - name: METRICS_PORT
              value: "8003"
            # Origin edge node, stamped onto every DetectionResult for the fleet dashboard.
            - name: EDGE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 50053
              name: grpc
            - containerPort: 8003
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
# No Service: only client is this node's preprocessing, over localhost:50053 (hostNetwork).
