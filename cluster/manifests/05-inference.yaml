apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: isac-sensing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - ingestion
              topologyKey: kubernetes.io/hostname
      containers:
        - name: inference
          image: isac-inference:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OUTPUT_SERVICE
              value: "output:50054"
            - name: LISTEN_PORT
              value: "50053"
            - name: METRICS_PORT
              value: "8003"
          ports:
            - containerPort: 50053
              name: grpc
            - containerPort: 8003
              name: metrics
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: isac-sensing
spec:
  selector:
    app: inference
  ports:
    - port: 50053
      targetPort: 50053
      name: grpc
