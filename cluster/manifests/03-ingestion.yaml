apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ingestion
  namespace: isac-sensing
spec:
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        isac-edge: "true"
      tolerations:
        - key: node-role.kubernetes.io/edge
          operator: Exists
          effect: NoSchedule
      containers:
        - name: ingestion
          image: isac-ingestion:latest
          imagePullPolicy: Always
          env:
            # Node-local hop over localhost (hostNetwork + DaemonSet). No Service/kube-proxy.
            - name: PREPROCESSING_SERVICE
              value: "localhost:50052"
            - name: LISTEN_PORT
              value: "50051"
            - name: METRICS_PORT
              value: "8001"
          ports:
            - containerPort: 50051
              hostPort: 50051
              name: grpc
            - containerPort: 8001
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
# No Service for ingestion under KubeEdge: the only client (simulator) is colocated on the
# same edge node and reaches it via localhost:50051 (hostNetwork). A ClusterIP would need
# kube-proxy (absent on edge) and, via EdgeMesh, could smear frames to another node's pod.
# The whole node-local hot path is localhost-wired; only `output` keeps a Service (§EdgeMesh).
