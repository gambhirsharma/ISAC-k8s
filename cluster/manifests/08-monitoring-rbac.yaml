apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: isac-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus
  namespace: isac-sensing
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus
  namespace: isac-sensing
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: isac-monitoring
roleRef:
  kind: Role
  name: prometheus
  apiGroup: rbac.authorization.k8s.io
