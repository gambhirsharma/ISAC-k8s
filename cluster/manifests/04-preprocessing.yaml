apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: preprocessing
  namespace: isac-sensing
spec:
  selector:
    matchLabels:
      app: preprocessing
  template:
    metadata:
      labels:
        app: preprocessing
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
    spec:
      # DaemonSet + nodeSelector puts one preprocessing pod on every edge node,
      # colocated with that node's ingestion/inference. Replaces the old single-pod
      # podAffinity-to-ingestion trick, which only ever placed ONE preprocessing pod.
      nodeSelector:
        isac-edge: "true"
      containers:
        - name: preprocessing
          image: isac-preprocessing:latest
          imagePullPolicy: Always
          env:
            - name: INFERENCE_SERVICE
              value: "inference:50053"
            - name: LISTEN_PORT
              value: "50052"
            - name: METRICS_PORT
              value: "8002"
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 8002
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: preprocessing
  namespace: isac-sensing
spec:
  selector:
    app: preprocessing
  # Node-local: ingestion on edge-A only reaches preprocessing on edge-A.
  internalTrafficPolicy: Local
  ports:
    - port: 50052
      targetPort: 50052
      name: grpc
