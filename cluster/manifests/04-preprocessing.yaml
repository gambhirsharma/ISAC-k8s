apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: preprocessing
  namespace: isac-sensing
spec:
  selector:
    matchLabels:
      app: preprocessing
  template:
    metadata:
      labels:
        app: preprocessing
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
    spec:
      # DaemonSet + nodeSelector puts one preprocessing pod on every edge node,
      # colocated with that node's ingestion/inference.
      nodeSelector:
        isac-edge: "true"
      tolerations:
        - key: node-role.kubernetes.io/edge
          operator: Exists
          effect: NoSchedule
      # hostNetwork so ingestion reaches it on localhost:50052 and it reaches this node's
      # inference on localhost:50053 (no kube-proxy on edge).
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: preprocessing
          image: isac-preprocessing:latest
          imagePullPolicy: Always
          env:
            # Node-local hop over localhost.
            - name: INFERENCE_SERVICE
              value: "localhost:50053"
            - name: LISTEN_PORT
              value: "50052"
            - name: METRICS_PORT
              value: "8002"
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 8002
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
# No Service: only client is this node's ingestion, over localhost:50052 (hostNetwork).
