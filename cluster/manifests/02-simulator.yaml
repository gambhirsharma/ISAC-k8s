apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: simulator
  namespace: isac-sensing
spec:
  selector:
    matchLabels:
      app: simulator
  template:
    metadata:
      labels:
        app: simulator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      # KubeEdge: run only on edge nodes. Tolerate the edge node-role taint (present on
      # some KubeEdge setups) so the DaemonSet can land there; nodeSelector is the on-switch.
      nodeSelector:
        isac-edge: "true"
      tolerations:
        - key: node-role.kubernetes.io/edge
          operator: Exists
          effect: NoSchedule
      # hostNetwork so simulator reaches this node's ingestion over localhost (no kube-proxy
      # on edge under KubeEdge). ClusterFirstWithHostNet keeps cluster DNS working so the
      # clock-sync probe can still resolve the cross-node `output` service via EdgeMesh.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: simulator
          image: isac-simulator:latest
          imagePullPolicy: Always
          env:
            # Node-local hop: DaemonSet = one ingestion pod per node, hostNetwork = localhost is
            # this node. No Service/kube-proxy needed for the on-node hot path.
            - name: INGESTION_SERVICE
              value: "localhost:50051"
            # Cross-node hop (edge->cloud). Resolved by EdgeMesh; override to
            # <cloud-lan-ip>:<nodeport> to use the NodePort fallback instead.
            - name: CLOCK_SYNC_TARGET
              value: "output:50054"
            # Reported to output on each clock probe so it can skew-correct this node's e2e.
            - name: EDGE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: METRICS_PORT
              value: "8000"
          ports:
            - containerPort: 8000
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
