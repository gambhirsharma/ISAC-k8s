apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: simulator
  namespace: isac-sensing
spec:
  selector:
    matchLabels:
      app: simulator
  template:
    metadata:
      labels:
        app: simulator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      nodeSelector:
        isac-edge: "true"
      containers:
        - name: simulator
          image: isac-simulator:latest
          imagePullPolicy: Always
          env:
            - name: INGESTION_SERVICE
              value: "ingestion:50051"
            - name: METRICS_PORT
              value: "8000"
          ports:
            - containerPort: 8000
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
