apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: isac-monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: isac-monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: isac
        orgId: 1
        folder: ISAC
        type: file
        disableDeletion: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-isac
  namespace: isac-monitoring
data:
  isac-pipeline.json: |
    {
      "title": "ISAC Fleet (KubeEdge)",
      "uid": "isac-pipeline",
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "5s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Edge nodes connected",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "targets": [
            { "expr": "output_edge_nodes_connected", "legendFormat": "connected" }
          ]
        },
        {
          "id": 2,
          "title": "Result throughput per edge node (frames/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 0 },
          "targets": [
            { "expr": "sum by (edge_node) (rate(output_results_stored_total[1m]))", "legendFormat": "{{edge_node}}" }
          ]
        },
        {
          "id": 3,
          "title": "E2E latency, raw — fleet-wide (p50/p95/p99), NOT clock-skew corrected",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            { "expr": "histogram_quantile(0.50, sum by (le) (rate(output_end_to_end_latency_raw_ms_bucket[1m])))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum by (le) (rate(output_end_to_end_latency_raw_ms_bucket[1m])))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum by (le) (rate(output_end_to_end_latency_raw_ms_bucket[1m])))", "legendFormat": "p99" }
          ]
        },
        {
          "id": 4,
          "title": "E2E latency p95 per edge node (raw)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum by (edge_node, le) (rate(output_end_to_end_latency_raw_ms_bucket[1m])))", "legendFormat": "{{edge_node}}" }
          ]
        },
        {
          "id": 5,
          "title": "Per-stage local latency p95 (from fan-in) — fleet-wide",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum by (stage, le) (rate(output_stage_latency_ms_bucket[1m])))", "legendFormat": "{{stage}} p95" }
          ]
        },
        {
          "id": 6,
          "title": "Inference stage latency p95 per edge node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum by (edge_node, le) (rate(output_stage_latency_ms_bucket{stage=\"inference\"}[1m])))", "legendFormat": "{{edge_node}}" }
          ]
        },
        {
          "id": 7,
          "title": "Total results stored per node (counter)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
          "targets": [
            { "expr": "sum by (edge_node) (output_results_stored_total)", "legendFormat": "{{edge_node}}" }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: isac-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-isac
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-isac
          configMap:
            name: grafana-dashboard-isac
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: isac-monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http
